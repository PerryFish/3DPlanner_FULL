p5c_real_sensor_input_interface:
  ros__parameters:
    # Interface modes:
    # - synthetic_fallback: use the P5B realistic synthetic scene through /points_raw.
    # - external_pointcloud: bridge a live external PointCloud2 topic.
    # - recorded_bag: play a rosbag2 directory and bridge the selected PointCloud2 topic.
    sensor_input_mode: "synthetic_fallback"
    supported_sensor_input_modes: ["external_pointcloud", "recorded_bag", "synthetic_fallback"]

    common_pointcloud_topics:
      - "/camera/depth/points"
      - "/realsense/depth/color/points"
      - "/lidar/points"
      - "/points_raw"
      - "/livox/lidar"
      - "/velodyne_points"
      - "/ouster/points"

    default_input_topic: "/points_raw"
    selected_input_topic: "/points_raw"
    bridge_output_topic: "/bimodal/points"
    synthetic_fallback_scene_profile: "realistic_room_corridor_v1"
    synthetic_fallback_enable: true

    recorded_bag_path: ""
    recorded_bag_auto_select_pointcloud_topic: true
    recorded_bag_selected_pointcloud_topic: ""
    recorded_bag_play_rate: 1.0
    recorded_bag_loop: false
    recorded_bag_use_sim_time: false

    map_backend_mode: "octomap_style_voxel"
    rviz_config: "/home/nuaa/ZHY/3DPlanner_FULL/Map/rviz/p5b_explainable_bimodal_demo.rviz"
    explainability_overlay_enable: true
    tf_guard_enable: true
    mode_mux_enable: true
    fake_executor_enable: true

    air_planner_mode: "fuel_style_v0"
    air_quality_profile: "p3b_optimized"
    air_config_file: "/home/nuaa/ZHY/3DPlanner_FULL/Air/config/p3b_air_fuel_quality.yaml"

    ground_planner_mode: "ground_3d_frontier_v0"
    ground_quality_profile: "p4b_optimized"
    ground_config_file: "/home/nuaa/ZHY/3DPlanner_FULL/Ground/config/p4b_ground_3d_quality.yaml"

    safety_contract:
      no_real_control_topic: true
      forbidden_topics:
        - "/cmd_vel"
        - "/mavros/*"
        - "/fmu/*"
        - "/actuator/*"
        - "/offboard_control_mode"
        - "/trajectory_setpoint"

real_sensor_pointcloud_bridge_node:
  ros__parameters:
    sensor_input_mode: "external_pointcloud"
    input_topic: "/points_raw"
    output_topic: "/bimodal/points"
    input_topics:
      - "/camera/depth/points"
      - "/realsense/depth/color/points"
      - "/lidar/points"
      - "/points_raw"
      - "/livox/lidar"
      - "/velodyne_points"
      - "/ouster/points"
    target_frame: "map"
    use_tf_transform: false
    passthrough_frame_if_tf_missing: true
    min_range_m: 0.05
    max_range_m: 30.0
    max_points_per_cloud: 20000
    voxel_downsample_leaf_size: 0.05
    publish_rate_limit_hz: 10.0
    input_timeout_sec: 2.0
    enable_diagnostics: true
    preserve_real_header_stamp: true
